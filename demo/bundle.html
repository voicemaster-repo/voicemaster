<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VoiceFlow Pro</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #0a0a0f 0%, #1a1a2e 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: rgba(15, 25, 45, 0.8);
            backdrop-filter: blur(16px);
            border-radius: 32px;
            padding: 32px;
            width: 500px;
            max-width: 100%;
            border: 1px solid rgba(168, 85, 247, 0.3);
        }
        h1 {
            text-align: center;
            margin-bottom: 24px;
            background: linear-gradient(135deg, #c084fc, #e879f9);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            font-size: 28px;
        }
        .input-group {
            margin-bottom: 16px;
        }
        label {
            display: block;
            margin-bottom: 6px;
            font-size: 13px;
            color: #a0a0b0;
            font-weight: 500;
        }
        input {
            width: 100%;
            padding: 12px 14px;
            border-radius: 16px;
            border: 1px solid rgba(168, 85, 247, 0.4);
            background: rgba(0, 0, 0, 0.4);
            color: white;
            font-size: 15px;
        }
        input:focus {
            outline: none;
            border-color: #a855f7;
        }
        button {
            width: 100%;
            padding: 12px;
            border-radius: 40px;
            border: none;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 8px;
        }
        .btn-primary {
            background: linear-gradient(135deg, #a855f7, #e879f9);
            color: white;
        }
        .btn-primary:hover {
            transform: scale(1.02);
        }
        .btn-danger {
            background: #ef4444;
            color: white;
        }
        .btn-secondary {
            background: rgba(107, 114, 128, 0.3);
            color: white;
            border: 1px solid rgba(255,255,255,0.2);
        }
        .status {
            padding: 12px;
            border-radius: 20px;
            margin: 16px 0;
            text-align: center;
            font-weight: 500;
            font-size: 14px;
        }
        .status.online {
            background: rgba(34, 197, 94, 0.2);
            border: 1px solid #22c55e;
            color: #22c55e;
        }
        .status.connecting {
            background: rgba(245, 158, 11, 0.2);
            border: 1px solid #f59e0b;
            color: #f59e0b;
        }
        .status.offline {
            background: rgba(107, 114, 128, 0.2);
            border: 1px solid #6b7280;
            color: #9ca3af;
        }
        .peers-container {
            margin: 16px 0;
            padding: 12px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 20px;
        }
        .peer-item {
            padding: 8px 12px;
            margin: 6px 0;
            background: rgba(168, 85, 247, 0.2);
            border-radius: 40px;
            font-size: 14px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .peer-speaking {
            background: rgba(34, 197, 94, 0.3);
            border-left: 3px solid #22c55e;
        }
        .button-group {
            display: flex;
            gap: 12px;
            margin-top: 16px;
        }
        .button-group button {
            flex: 1;
            margin-top: 0;
        }
        .volume-slider {
            margin: 16px 0;
        }
        .volume-slider input {
            width: 100%;
            margin-top: 8px;
        }
        .quality-badge {
            background: #a855f7;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 11px;
            margin-bottom: 16px;
            text-align: center;
            display: inline-block;
            width: auto;
            margin-left: auto;
            margin-right: auto;
        }
    </style>
</head>
<body>
    <div class="container">
        <div style="text-align: center;">
            <div class="quality-badge">🎙️ High Quality Audio</div>
        </div>
        <h1>VoiceFlow Pro</h1>
        
        <div class="input-group">
            <label>👤 Ваше имя</label>
            <input type="text" id="name" placeholder="Введите имя">
        </div>
        
        <div class="input-group">
            <label>🏠 Комната</label>
            <input type="text" id="room" placeholder="Название комнаты" value="main">
        </div>
        
        <button id="connectBtn" class="btn-primary">🔌 Подключиться</button>
        
        <div id="status" class="status offline">⚫ Не в сети</div>
        
        <div id="peersContainer" class="peers-container" style="display: none;">
            <div style="font-size: 12px; margin-bottom: 8px;">👥 В комнате:</div>
            <div id="peersList"></div>
        </div>
        
        <div id="controlPanel" style="display: none;">
            <div class="volume-slider">
                <label>🔊 Громкость собеседника</label>
                <input type="range" id="volume" min="0" max="100" value="80">
            </div>
            <div class="button-group">
                <button id="muteBtn" class="btn-secondary">🎤 Отключить микрофон</button>
                <button id="disconnectBtn" class="btn-danger">🚪 Выйти</button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/simple-peer@9.11.1/simplepeer.min.js"></script>

    <script>
        // DOM элементы
        const nameInput = document.getElementById('name');
        const roomInput = document.getElementById('room');
        const connectBtn = document.getElementById('connectBtn');
        const statusDiv = document.getElementById('status');
        const peersContainer = document.getElementById('peersContainer');
        const peersList = document.getElementById('peersList');
        const controlPanel = document.getElementById('controlPanel');
        const muteBtn = document.getElementById('muteBtn');
        const disconnectBtn = document.getElementById('disconnectBtn');
        const volumeSlider = document.getElementById('volume');
        
        // Установка случайного имени
        nameInput.value = `Гость_${Math.floor(Math.random() * 1000)}`;
        
        let client = null;
        let currentRoom = '';
        let currentName = '';
        let currentAudio = null;
        
        // Класс клиента
        class VoiceClient {
            constructor(serverUrl, roomId, userId) {
                this.serverUrl = serverUrl;
                this.roomId = roomId;
                this.userId = userId;
                this.ws = null;
                this.peers = new Map();
                this.localStream = null;
                this.remoteAudios = new Map();
                this.isConnected = false;
            }
            
            async start() {
                try {
                    // Запрос микрофона с высоким качеством
                    this.localStream = await navigator.mediaDevices.getUserMedia({
                        audio: {
                            echoCancellation: true,
                            noiseSuppression: true,
                            autoGainControl: true,
                            sampleRate: 48000,
                            channelCount: 1,
                            latency: 0.01
                        }
                    });
                    
                    // Подключение WebSocket
                    this.ws = new WebSocket(`${this.serverUrl}?userId=${this.userId}&roomId=${this.roomId}`);
                    
                    return new Promise((resolve, reject) => {
                        this.ws.onopen = () => {
                            this.ws.send(JSON.stringify({
                                type: 'join',
                                roomId: this.roomId,
                                userId: this.userId
                            }));
                            this.isConnected = true;
                            resolve();
                        };
                        
                        this.ws.onmessage = (e) => {
                            const msg = JSON.parse(e.data);
                            this.handleMessage(msg);
                        };
                        
                        this.ws.onerror = reject;
                        this.ws.onclose = () => {
                            this.isConnected = false;
                            this.onDisconnect();
                        };
                    });
                } catch (err) {
                    throw err;
                }
            }
            
            handleMessage(msg) {
                switch(msg.type) {
                    case 'user-joined':
                        if (msg.userId !== this.userId) {
                            this.createPeer(msg.userId, true);
                            this.onUserJoined(msg.userId);
                        }
                        break;
                    case 'signal':
                        this.handleSignal(msg.userId, msg.payload);
                        break;
                    case 'user-left':
                        this.destroyPeer(msg.userId);
                        this.onUserLeft(msg.userId);
                        break;
                }
            }
            
            createPeer(targetId, initiator) {
                if (this.peers.has(targetId)) return;
                
                const peer = new SimplePeer({
                    initiator: initiator,
                    trickle: true,
                    stream: this.localStream
                });
                
                peer.on('signal', (data) => {
                    this.ws.send(JSON.stringify({
                        type: 'signal',
                        userId: targetId,
                        roomId: this.roomId,
                        payload: data
                    }));
                });
                
                peer.on('stream', (stream) => {
                    const audio = new Audio();
                    audio.srcObject = stream;
                    audio.volume = volumeSlider ? volumeSlider.value / 100 : 0.8;
                    audio.autoplay = true;
                    audio.play().catch(e => console.log(e));
                    this.remoteAudios.set(targetId, audio);
                    this.onRemoteStream(targetId);
                });
                
                peer.on('error', (err) => console.log('Peer error:', err));
                
                this.peers.set(targetId, peer);
            }
            
            handleSignal(targetId, signal) {
                let peer = this.peers.get(targetId);
                if (!peer) {
                    this.createPeer(targetId, false);
                    peer = this.peers.get(targetId);
                }
                if (peer) peer.signal(signal);
            }
            
            destroyPeer(targetId) {
                const peer = this.peers.get(targetId);
                if (peer) {
                    peer.destroy();
                    this.peers.delete(targetId);
                }
                const audio = this.remoteAudios.get(targetId);
                if (audio) {
                    audio.pause();
                    this.remoteAudios.delete(targetId);
                }
            }
            
            stop() {
                if (this.ws) this.ws.close();
                this.peers.forEach((peer, id) => this.destroyPeer(id));
                if (this.localStream) {
                    this.localStream.getTracks().forEach(track => track.stop());
                }
                this.isConnected = false;
            }
            
            toggleMute() {
                if (this.localStream) {
                    const track = this.localStream.getAudioTracks()[0];
                    track.enabled = !track.enabled;
                    return track.enabled;
                }
                return true;
            }
            
            isMuted() {
                return !this.localStream?.getAudioTracks()[0]?.enabled;
            }
            
            setVolume(value) {
                this.remoteAudios.forEach(audio => {
                    if (audio) audio.volume = value / 100;
                });
            }
            
            getPeers() {
                return Array.from(this.peers.keys());
            }
            
            onUserJoined(userId) {}
            onUserLeft(userId) {}
            onRemoteStream(userId) {}
            onDisconnect() {}
        }
        
        function updateUI() {
            if (!client) return;
            const peers = client.getPeers();
            
            if (peers.length === 0) {
                peersContainer.style.display = 'none';
                return;
            }
            
            peersContainer.style.display = 'block';
            peersList.innerHTML = peers.map(peer => `
                <div class="peer-item" id="peer-${peer}">
                    <span>🎤 ${peer}</span>
                    <span style="font-size: 11px;">🔊 онлайн</span>
                </div>
            `).join('');
        }
        
        volumeSlider.oninput = () => {
            if (client) {
                client.setVolume(volumeSlider.value);
            }
        };
        
        connectBtn.onclick = async () => {
            const name = nameInput.value.trim();
            if (!name) {
                alert('Введите ваше имя');
                return;
            }
            
            const room = roomInput.value.trim() || 'main';
            currentRoom = room;
            currentName = name;
            
            statusDiv.textContent = '🔄 Подключение...';
            statusDiv.className = 'status connecting';
            connectBtn.disabled = true;
            connectBtn.textContent = 'Подключение...';
            
            client = new VoiceClient('ws://localhost:3001', room, name);
            
            client.onUserJoined = (userId) => {
                updateUI();
            };
            
            client.onUserLeft = (userId) => {
                updateUI();
            };
            
            client.onRemoteStream = (userId) => {
                updateUI();
                const peerElement = document.getElementById(`peer-${userId}`);
                if (peerElement) {
                    peerElement.classList.add('peer-speaking');
                    setTimeout(() => {
                        if (peerElement) peerElement.classList.remove('peer-speaking');
                    }, 500);
                }
            };
            
            client.onDisconnect = () => {
                statusDiv.textContent = '⚫ Потеряно соединение';
                statusDiv.className = 'status offline';
                connectBtn.style.display = 'block';
                controlPanel.style.display = 'none';
                peersContainer.style.display = 'none';
                connectBtn.disabled = false;
                connectBtn.textContent = '🔌 Подключиться';
                client = null;
            };
            
            try {
                await client.start();
                
                statusDiv.textContent = '🎙️ В сети! Говорите';
                statusDiv.className = 'status online';
                connectBtn.style.display = 'none';
                controlPanel.style.display = 'block';
                updateUI();
                
            } catch (err) {
                console.error(err);
                statusDiv.textContent = '❌ Ошибка подключения';
                statusDiv.className = 'status offline';
                connectBtn.style.display = 'block';
                controlPanel.style.display = 'none';
                connectBtn.disabled = false;
                connectBtn.textContent = '🔌 Подключиться';
                alert('Ошибка: ' + err.message);
            }
        };
        
        muteBtn.onclick = () => {
            if (client) {
                const unmuted = client.toggleMute();
                muteBtn.textContent = unmuted ? '🔇 Отключить микрофон' : '🎤 Включить микрофон';
            }
        };
        
        disconnectBtn.onclick = () => {
            if (client) {
                client.stop();
                client = null;
                
                statusDiv.textContent = '⚫ Отключено';
                statusDiv.className = 'status offline';
                connectBtn.style.display = 'block';
                connectBtn.disabled = false;
                connectBtn.textContent = '🔌 Подключиться';
                controlPanel.style.display = 'none';
                peersContainer.style.display = 'none';
            }
        };
    </script>
</body>
</html>

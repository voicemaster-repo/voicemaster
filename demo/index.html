<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VoiceFlow Demo</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: system-ui;
            background: linear-gradient(135deg, #0a0a0f, #1a1a2e);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
        }
        .container {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(20px);
            border-radius: 32px;
            padding: 40px;
            width: 500px;
            max-width: 90%;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.1);
        }
        h1 { text-align: center; margin-bottom: 24px; background: linear-gradient(135deg, #a855f7, #e879f9); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .input-group { margin-bottom: 16px; }
        label { display: block; margin-bottom: 8px; font-size: 14px; color: #a0a0a0; }
        input { width: 100%; padding: 12px 16px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.2); background: rgba(0,0,0,0.3); color: white; font-size: 16px; }
        input:focus { outline: none; border-color: #a855f7; }
        button { width: 100%; padding: 12px; border-radius: 12px; border: none; font-size: 16px; font-weight: 600; cursor: pointer; transition: all 0.3s; margin-top: 8px; }
        .btn-primary { background: linear-gradient(135deg, #a855f7, #e879f9); color: white; }
        .btn-primary:hover { transform: translateY(-2px); }
        .btn-danger { background: #ef4444; color: white; }
        .status { padding: 12px; border-radius: 12px; margin: 16px 0; text-align: center; font-weight: 500; }
        .status.connected { background: rgba(34,197,94,0.2); border: 1px solid #22c55e; color: #22c55e; }
        .status.connecting { background: rgba(245,158,11,0.2); border: 1px solid #f59e0b; color: #f59e0b; }
        .status.disconnected { background: rgba(239,68,68,0.2); border: 1px solid #ef4444; color: #ef4444; }
        .peers-list { margin: 16px 0; padding: 12px; background: rgba(0,0,0,0.2); border-radius: 12px; }
        .peers-list h3 { font-size: 14px; margin-bottom: 8px; color: #a0a0a0; }
        .peer-item { padding: 4px 8px; margin: 4px 0; background: rgba(168,85,247,0.2); border-radius: 8px; font-size: 14px; display: flex; justify-content: space-between; align-items: center; }
        .speaking-indicator { width: 8px; height: 8px; background: #22c55e; border-radius: 50%; animation: pulse 1s infinite; }
        @keyframes pulse { 0%,100% { opacity: 0.3; transform: scale(0.8); } 50% { opacity: 1; transform: scale(1.2); } }
        .button-group { display: flex; gap: 12px; margin-top: 16px; }
        .button-group button { flex: 1; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎙️ VoiceFlow Demo</h1>
        <div class="input-group">
            <label>Ваше имя</label>
            <input type="text" id="userId" placeholder="Введите имя">
        </div>
        <div class="input-group">
            <label>Название комнаты</label>
            <input type="text" id="roomId" placeholder="Название комнаты" value="default">
        </div>
        <div class="input-group">
            <label>Адрес signaling сервера</label>
            <input type="text" id="serverUrl" placeholder="ws://localhost:3001" value="ws://localhost:3001">
        </div>
        <button id="connectBtn" class="btn-primary">🔌 Подключиться</button>
        <div id="status" class="status disconnected">⚫ Отключено</div>
        <div id="peersContainer" class="peers-list" style="display: none;">
            <h3>👥 В комнате:</h3>
            <div id="peersList"></div>
        </div>
        <div class="button-group" id="controlButtons" style="display: none;">
            <button id="muteBtn">🎤 Заглушить</button>
            <button id="disconnectBtn" class="btn-danger">🚪 Выйти</button>
        </div>
    </div>

    <script type="importmap">
        {
            "imports": {
                "@voiceflow/core": "../packages/core/dist/index.mjs"
            }
        }
    </script>

    <script type="module">
        import { VoiceClient } from '@voiceflow/core';
        
        let client = null;
        
        const elements = {
            userId: document.getElementById('userId'),
            roomId: document.getElementById('roomId'),
            serverUrl: document.getElementById('serverUrl'),
            connectBtn: document.getElementById('connectBtn'),
            status: document.getElementById('status'),
            peersContainer: document.getElementById('peersContainer'),
            peersList: document.getElementById('peersList'),
            controlButtons: document.getElementById('controlButtons'),
            muteBtn: document.getElementById('muteBtn'),
            disconnectBtn: document.getElementById('disconnectBtn')
        };
        
        function updateStatus(status, message) {
            elements.status.textContent = message;
            elements.status.className = `status ${status}`;
        }
        
        function updatePeersList(peers, speakingUsers) {
            if (peers.length === 0) {
                elements.peersContainer.style.display = 'none';
                return;
            }
            elements.peersContainer.style.display = 'block';
            elements.peersList.innerHTML = peers.map(peer => `
                <div class="peer-item">
                    <span>${peer}</span>
                    ${speakingUsers.has(peer) ? '<div class="speaking-indicator"></div>' : '<span style="font-size:12px">🤐</span>'}
                </div>
            `).join('');
        }
        
        async function connect() {
            const userId = elements.userId.value.trim() || `user_${Math.random().toString(36).substr(2, 6)}`;
            const roomId = elements.roomId.value.trim() || 'default';
            const serverUrl = elements.serverUrl.value.trim() || 'ws://localhost:3001';
            
            elements.userId.value = userId;
            
            updateStatus('connecting', '🔄 Подключение...');
            
            client = new VoiceClient({
                signalingUrl: serverUrl,
                roomId: roomId,
                userId: userId
            });
            
            client.on('connected', () => {
                updateStatus('connected', '🎙️ Подключено! Говорите');
                elements.controlButtons.style.display = 'flex';
                elements.connectBtn.style.display = 'none';
            });
            
            client.on('disconnected', () => {
                updateStatus('disconnected', '⚫ Отключено');
                elements.controlButtons.style.display = 'none';
                elements.connectBtn.style.display = 'block';
                elements.peersContainer.style.display = 'none';
                client = null;
            });
            
            client.on('remoteStream', (stream) => {
                const audio = new Audio();
                audio.srcObject = stream;
                audio.play().catch(e => console.log('Audio play error:', e));
                console.log('✅ Получен аудиопоток');
            });
            
            client.on('userJoined', (userId) => {
                console.log(`👋 Пользователь ${userId} присоединился`);
                if (client) updatePeersList(client.getPeers(), new Set());
            });
            
            client.on('userLeft', (userId) => {
                console.log(`👋 Пользователь ${userId} покинул`);
                if (client) updatePeersList(client.getPeers(), new Set());
            });
            
            client.on('speaking', (userId) => {
                if (client) updatePeersList(client.getPeers(), new Set([userId]));
            });
            
            client.on('stoppedSpeaking', (userId) => {
                if (client) updatePeersList(client.getPeers(), new Set());
            });
            
            client.on('error', (err) => {
                console.error('❌ Ошибка:', err);
                updateStatus('disconnected', `❌ Ошибка: ${err.message}`);
            });
            
            await client.connect();
            
            setInterval(() => {
                if (client && client.isConnectedToRoom && client.isConnectedToRoom()) {
                    updatePeersList(client.getPeers(), new Set());
                }
            }, 2000);
        }
        
        elements.connectBtn.onclick = connect;
        
        elements.muteBtn.onclick = () => {
            if (client) {
                client.toggleMute();
                const isMuted = client.isMuted();
                elements.muteBtn.textContent = isMuted ? '🔇 Включить микрофон' : '🎤 Заглушить';
                elements.muteBtn.style.background = isMuted ? '#ef4444' : 'linear-gradient(135deg, #a855f7, #e879f9)';
            }
        };
        
        elements.disconnectBtn.onclick = () => {
            if (client) {
                client.disconnect();
                client = null;
            }
        };
        
        if (elements.userId.value === '') {
            elements.userId.value = `user_${Math.random().toString(36).substr(2, 6)}`;
        }
    </script>
</body>
</html>
